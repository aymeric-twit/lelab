name: Déploiement Gandi

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP et dépendances
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Installer Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Déployer via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: sftp.sd6.gpaas.net
          username: 9ac28d20-95f8-11e7-b83e-00163e61ef31
          password: ${{ secrets.GANDI_DEPLOY_TOKEN }}
          protocol: sftp
          port: 22
          local-dir: ./
          server-dir: /lamp0/web/vhosts/labs.yapasdequoi.com/htdocs/lelab/
          exclude: |
            **/.git*
            **/.git*/**
            **/.claude/**
            .env
            .phpunit.cache/**
            database/database.sqlite
            public/module-assets/**
            storage/logs/**
            storage/plugins/**
            tests/**
            phpstan.neon
            phpunit.xml
