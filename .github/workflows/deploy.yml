name: Déploiement Gandi

on:
  push:
    branches: [main]

  # Permet un déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:

env:
  GANDI_USER: 9ac28d20-95f8-11e7-b83e-00163e61ef31
  GANDI_GIT_HOST: git.sd6.gpaas.net
  GANDI_REPO: labs.yapasdequoi.com.git
  GANDI_SSH_HOST: git.sd6.gpaas.net

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Git pour Gandi
        run: |
          # Configurer le credential helper pour utiliser le token
          git config --global credential.helper store
          echo "https://$GANDI_USER:${{ secrets.GANDI_DEPLOY_TOKEN }}@$GANDI_GIT_HOST" > ~/.git-credentials

          # Ajouter le remote Gandi
          git remote add gandi https://$GANDI_USER@$GANDI_GIT_HOST/$GANDI_REPO

      - name: Push vers Gandi
        run: git push gandi main:master --force
