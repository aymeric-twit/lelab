name: Déploiement Gandi

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP et dépendances
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Installer Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Installer lftp
        run: sudo apt-get install -y lftp > /dev/null 2>&1

      - name: Déployer via SFTP
        env:
          GANDI_TOKEN: ${{ secrets.GANDI_DEPLOY_TOKEN }}
        run: |
          lftp -u "9ac28d20-95f8-11e7-b83e-00163e61ef31,$GANDI_TOKEN" sftp://sftp.sd6.gpaas.net -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            mirror --reverse --delete --verbose \
              --exclude ^\.git/ \
              --exclude ^\.github/ \
              --exclude ^\.claude/ \
              --exclude ^\.env$ \
              --exclude ^\.phpunit\.cache/ \
              --exclude ^database/database\.sqlite$ \
              --exclude ^public/module-assets/ \
              --exclude ^storage/logs/ \
              --exclude ^storage/plugins/ \
              --exclude ^storage/cache/ \
              --exclude ^storage/backups/ \
              --exclude ^tests/ \
              --exclude ^phpstan\.neon$ \
              --exclude ^phpunit\.xml$ \
              --exclude ^Dockerfile$ \
              --exclude ^docker-compose\.yml$ \
              --exclude ^docker/ \
              ./ /lamp0/web/vhosts/labs.yapasdequoi.com/htdocs/lelab/;
            bye
          "
