name: Déploiement Gandi

on:
  push:
    branches: [main]

  # Permet un déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:

env:
  DEPLOY_HOST: console.sd6.gpaas.net
  DEPLOY_USER: "45947"
  DEPLOY_PATH: /srv/data/web/vhosts/labs.yapasdequoi.com/htdocs/lelab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Installer les dépendances Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GANDI_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Déployer via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.env' \
            --exclude='.phpunit.cache/' \
            --exclude='database/database.sqlite' \
            --exclude='public/module-assets/' \
            --exclude='storage/logs/' \
            --exclude='storage/plugins/' \
            --exclude='tests/' \
            --exclude='phpstan.neon' \
            --exclude='phpunit.xml' \
            ./ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/
